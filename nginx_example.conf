# Nginx Configuration for LKP Kota Portal
# Save this file to /etc/nginx/sites-available/lkpkota (on Linux server)

server {
    listen 80;
    server_name your-domain.com; # Ganti dengan domain atau IP server anda
    root /var/www/lkpkota;      # Ganti dengan path root proyek anda di server

    index index.php index.html index.htm;

    # Penanganan URL utama
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Penanganan folder dashboard (d-board)
    location /d-board/ {
        try_files $uri $uri/ /d-board/index.php?$query_string;
    }

    # Proses file PHP menggunakan FastCGI (PHP-FPM)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf; # File standar nginx
        
        # Pastikan path ini sesuai dengan versi PHP anda (misalnya php8.1-fpm.sock atau php7.4-fpm.sock)
        fastcgi_pass unix:/var/run/php/php-fpm.sock; 
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blokir akses ke folder .git atau file konfigurasi sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/config/.*\.php$ {
        deny all;
    }

    # Penanganan static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}
