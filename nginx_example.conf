# Nginx Configuration for LKP Kota Portal (FINAL STABLE VERSION)

server {
    listen 80;
    server_name lkpkota.logme.biz.id;
    root /var/www;

    index index.php index.html index.htm;

    # Penanganan URL utama & Directory Trailing Slash secara robust
    location / {
        # Selalu fallback ke /index.php jika file tidak ditemukan
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Penanganan folder dashboard (d-board) - Tanpa diskonfigurasi trial
    location /d-board/ {
        index index.php;
        try_files $uri $uri/ /d-board/index.php?$query_string;
    }

    # Proses file PHP menggunakan FastCGI (Fully Self-contained)
    location ~ \.php$ {
        # Memastikan file PHP benar-benar ada di filesystem sebelum dikirim ke PHP-FPM
        # Ini mencegah pesan "File not found" dari PHP-FPM itu sendiri
        if (!-f $request_filename) {
            return 404;
        }

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        
        # Konfigurasi parameter FastCGI dasar
        include fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME    $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT      $realpath_root;
        fastcgi_param  PATH_INFO          $fastcgi_path_info;
        
        # Optimasi buffer & timeouts
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;

        # Hindari 502/504 intermiten di Docker
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Blokir akses ke folder .git atau file konfigurasi sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/config/.*\.php$ {
        deny all;
    }

    # Penanganan static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        log_not_found off;
        access_log off;
    }
}
