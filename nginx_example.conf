# Nginx Configuration for LKP Kota Portal (DOCKER VERSION)
# Save this file to your nginx.conf or default.conf inside Docker

server {
    listen 80;
    server_name lkpkota.logme.biz.id; # Ganti dengan domain atau IP server anda
    root /var/www; # Pastikan sesuai dengan volume mapping di docker-compose

    index index.php index.html index.htm;

    # Penanganan URL utama
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Penanganan folder dashboard (d-board)
    location /d-board/ {
        try_files $uri $uri/ /d-board/index.php?$query_string;
    }

    # Proses file PHP menggunakan FastCGI (DOCKER CONNECT TO 'app' SERVICE)
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # 'app' adalah nama service di docker-compose.yml
        fastcgi_pass app:9000; 
        fastcgi_index index.php;
        
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Blokir akses ke folder .git atau file konfigurasi sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/config/.*\.php$ {
        deny all;
    }

    # Penanganan static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}
