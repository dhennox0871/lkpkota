# Nginx Configuration for LKP Kota Portal (DOCKER ROBUST VERSION)

server {
    listen 80;
    server_name lkpkota.logme.biz.id;
    root /var/www;

    index index.php index.html index.htm;

    # Penanganan URL utama & Directory Trailing Slash
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Penanganan folder dashboard (d-board) - Memastikan index.php terpanggil
    location /d-board/ {
        index index.php;
        try_files $uri $uri/ /d-board/index.php?$query_string;
    }

    # Proses file PHP menggunakan FastCGI
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000; # 'app' sesuai docker-compose.yml
        fastcgi_index index.php;
        
        include fastcgi_params;
        # Menggunakan $realpath_root untuk menghindari symlink/path issue di Docker
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Optimasi buffer untuk menghindari 502/intermittent issues
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Blokir akses ke folder .git atau file konfigurasi sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/config/.*\.php$ {
        deny all;
    }

    # Penanganan static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
        access_log off;
    }
}
